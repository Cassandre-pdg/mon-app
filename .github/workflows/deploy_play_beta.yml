name: Deploy Play Beta (Android)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Track Play Store (internal / alpha / beta)'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta

jobs:
  deploy_android:
    name: Build & Deploy Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installer les dépendances
        working-directory: flutter_app
        run: flutter pub get

      - name: Générer les fichiers Riverpod
        working-directory: flutter_app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Décoder le keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p flutter_app/android/app/keystore
          echo -n "$KEYSTORE_BASE64" | base64 --decode > flutter_app/android/app/keystore/solopro-release.jks

      - name: Build App Bundle (AAB)
        working-directory: flutter_app
        env:
          KEYSTORE_PATH: keystore/solopro-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build appbundle --release

      - name: Upload sur Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.solopro.app
          releaseFiles: flutter_app/build/app/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: draft
          changesNotSentForReview: false
