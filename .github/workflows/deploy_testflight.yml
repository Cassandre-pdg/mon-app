name: Deploy TestFlight (iOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_note:
        description: 'Note de version pour TestFlight'
        required: false
        default: 'Build beta Solo Pro'

jobs:
  deploy_ios:
    name: Build & Deploy iOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Installer les dépendances
        working-directory: flutter_app
        run: flutter pub get

      - name: Générer les fichiers Riverpod
        working-directory: flutter_app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Installer le certificat et profil de provisioning
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Créer le keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          # Importer le certificat
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Installer le profil de provisioning
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build IPA
        working-directory: flutter_app
        run: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload sur TestFlight via Transporter
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "flutter_app/build/ios/ipa/Solo Pro.ipa" \
            --username "$APPLE_ID" \
            --password "$APP_SPECIFIC_PASSWORD"
