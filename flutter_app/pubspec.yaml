name: kolyb
description: "Kolyb — ton élan, au quotidien. Compagnon des entrepreneurs indépendants."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # State management — Riverpod 2.x (jamais Provider, jamais Bloc)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Backend / Auth
  supabase_flutter: ^2.8.4

  # UI & polices
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Graphiques
  fl_chart: ^0.70.2

  # Notifications push
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

  # Stockage local
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # Notifications locales (Flow sessions)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Abonnements — RevenueCat (paywall Pro)
  purchases_flutter: ^9.16.1

  # Utilitaires
  logger: ^2.5.0
  intl: ^0.20.2
  uuid: ^4.5.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
